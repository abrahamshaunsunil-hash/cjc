    <div class="container">
        <div class="chatbox">
            <div class="chatbox__support">
                <div class="chatbox__header">
                    <div class="chatbox__image--header">
                        <img src="vai.png" alt="VAI">
                    </div>
                    <div class="chatbox__content--header">
                        <h4 class="chatbox__heading--header">Veronica VAI</h4>
                        <p class="chatbox__description--header">VAI-6.5</p>
                    </div>
                </div>
                <div class="chatbox__messages">
                    <div></div>
                </div>

                    <input type="text" placeholder="Write a message...">
                    <button class="chatbox__send--footer send__button">Send</button>
                </div>
            </div>
            <div class="chatbox__button">
                <button><img src="vai.png" alt="VA"></button>
            </div>
        </div>
    </div>
    <script>
        const words = ["BUSINESSES", "STARTUPS", "GROWTH", "INNOVATION"];
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const span = document.getElementById("dynamic-word");
        
        function typeEffect() {
            const currentWord = words[wordIndex];
            if (isDeleting) {
                charIndex--;
                span.textContent = currentWord.substring(0, charIndex);
                if (charIndex === 0) {
                    isDeleting = false;
                    wordIndex = (wordIndex + 1) % words.length;
                }
            } else {
                charIndex++;
                span.textContent = currentWord.substring(0, charIndex);
                if (charIndex === currentWord.length) {
                    isDeleting = true;
                }
            }
            setTimeout(typeEffect, isDeleting ? 60 : 200);
        }
        
        typeEffect();
    </script>
