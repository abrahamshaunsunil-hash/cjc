<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abraham Industries</title>
    <link rel="icon" href="/favicon.png">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <a href="#" class="logo">Abraham Industries</a>

        <i class='bx bx-menu' id="menu-icon"></i>

        <nav class="navbar">
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/skills">Skills</a>
            <a href="/services">Productions</a>
            <a href="/contact">Contact</a>
            <a href="/notification">Notifications</a>
        </nav>
    </header>
    <section  class="skills new-background" id="skills"> <!-- Add the "new-background" class here -->
        <!-- Your existing HTML content -->
    
        <h2 class="heading">Team <span>Progress</span></h2>
        <div class="skills-row">
            <div class="skills-column">
                <h3 class="title">Latest Progress</h3>
                <div class="skills-box">
                    <div class="skills-content">
                        <div class="progress">
                            <h3>Website Development <span>85%</span></h3>
                            <div class="bar"><span style="width: 85%;"></span></div>
                        </div>
                        <div class="progress">
                            <h3>AI Development <span>90%</span></h3>
                            <div class="bar"><span style="width: 90%;"></span></div>
                        </div>
                        <div class="progress">
                            <h3>Social Service <span>39%</span></h3>
                            <div class="bar"><span style="width: 20%;"></span></div>
                        </div>
                        <div class="progress">
                            <h3>Global-situations Solved <span>10%</span></h3>
                            <div class="bar"><span style="width: 1%;"></span></div>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </section>

    <div class="container">
        <div class="chatbox">
            <div class="chatbox__support">
                <div class="chatbox__header">
                    <div class="chatbox__image--header">
                        <img src="https://img.icons8.com/color/48/000000/circled-user-female-skin-type-5--v1.png" alt="image">
                    </div>
                    <div class="chatbox__content--header">
                        <h4 class="chatbox__heading--header">Veronica VAI</h4>
                        <p class="chatbox__description--header">VAI-6.5</p>
                    </div>
                </div>
                <div class="chatbox__messages">
                    <div></div>
                </div>
                <div class="chatbox__footer">
                    <input type="text" placeholder="Write a message...">
                    <button class="chatbox__send--footer send__button">Send</button>
                </div>
            </div>
            <div class="chatbox__button">
                <button><img src="./images/chatbox-icon.svg" /></button>
            </div>
        </div>
    </div>
    
    <script src="https://smtpjs.com/v3/smtp.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>        
    <script src ="script.js"></script>      
   
 </body>
